      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#E8530A"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#sunBg)"/>
  <!-- Cardinal rays -->
  <line x1="32" y1="5"  x2="32" y2="17" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="32" y1="47" x2="32" y2="59" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="5"  y1="32" x2="17" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="47" y1="32" x2="59" y2="32" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Diagonal rays -->
  <line x1="12.3" y1="12.3" x2="20.8" y2="20.8" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="43.2" y1="43.2" x2="51.7" y2="51.7" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="51.7" y1="12.3" x2="43.2" y2="20.8" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="20.8" y1="43.2" x2="12.3" y2="51.7" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- Sun disc -->
  <circle cx="32" cy="32" r="11" fill="white"/>
  <circle cx="32" cy="32" r="7"  fill="#F5A623"/>
  <circle cx="32" cy="32" r="3.5" fill="#E8530A"/>
